<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>清理未使用图片</title>
<style>
body{font-family:system-ui;padding:20px;background:#f0f2f5}
.container{max-width:600px;margin:0 auto}
.card{background:white;border-radius:12px;padding:20px}
button{background:#667eea;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer}
.btn-red{background:#e53e3e}
.result{background:#f0f0f0;padding:15px;border-radius:8px;margin-top:15px;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2>清理未使用的图片</h2>
<p>此工具会扫描所有文章，删除未被任何文章引用的图片。</p>
<button id="scanBtn">扫描未使用图片</button>
<button id="cleanBtn" class="btn-red" style="display:none">确认删除</button>
<div id="result" class="result"></div>
</div>
</div>
<script>
document.getElementById('scanBtn').onclick=async function(){
var btn=this;
btn.disabled=true;
btn.textContent='扫描中...';
var resultDiv=document.getElementById('result');
resultDiv.innerHTML='加载中...';
try{
var res=await fetch('/api/referenced-images');
var data=await res.json();
if(data.code===200){
var html='<strong>扫描结果</strong><br>';
html+='总图片: '+data.total+' 张<br>';
html+='引用中: '+data.referenced+' 张<br>';
html+='未引用: '+data.unused+' 张<br>';
if(data.unused>0){
html+='<br><span style="color:#e53e3e">发现 '+data.unused+' 张未使用的图片，可以安全删除。</span>';
document.getElementById('cleanBtn').style.display='inline-block';
}else{
html+='<br><span style="color:#38a169">所有图片都在使用中，无需清理。</span>';
}
resultDiv.innerHTML=html;
}else{
resultDiv.innerHTML='扫描失败: '+data.message;
}
}catch(err){
resultDiv.innerHTML='扫描失败: '+err.message;
}finally{
btn.disabled=false;
btn.textContent='扫描未使用图片';
}};
document.getElementById('cleanBtn').onclick=async function(){
if(!confirm('确定删除所有未使用的图片？此操作不可恢复！')) return;
var btn=this;
btn.disabled=true;
btn.textContent='删除中...';
try{
var res=await fetch('/api/clean-unused-images',{method:'POST'});
var data=await res.json();
if(data.code===200){
alert('清理完成！\n共删除 '+data.deleted+' 张未使用的图片');
location.reload();
}else{
alert('清理失败: '+data.message);
}
}catch(err){
alert('清理失败: '+err.message);
}finally{
btn.disabled=false;
btn.textContent='确认删除';
}};
</script>
</body>
</html>
